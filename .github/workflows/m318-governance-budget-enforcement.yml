name: M318 Governance Budget Enforcement

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/m318-governance-budget-enforcement.yml'
      - 'package.json'
      - '.github/ISSUE_TEMPLATE/*.yml'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'CONTRIBUTING.md'
      - 'docs/runbooks/objc3c_*'
      - 'spec/governance/*.json'
      - 'spec/planning/compiler/m318/**'
      - 'scripts/m318_governance_guard.py'
      - 'scripts/check_m315_d002_anti_noise_enforcement_implementation_core_feature_implementation.py'
      - 'scripts/check_m315_c002_artifact_authenticity_schema_and_evidence_contract_and_architecture_freeze.py'

jobs:
  govern:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run governance topology guard
        run: python scripts/m318_governance_guard.py --stage topology
