name: Compiler Closeout (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compiler-closeout:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Build full native objc3c closeout surface
        run: npm run build:objc3c-native:full
