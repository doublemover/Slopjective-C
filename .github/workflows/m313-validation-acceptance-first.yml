name: M313 Validation Acceptance-First

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/m313-validation-acceptance-first.yml"
      - "scripts/m313_acceptance_first_ci_runner.py"
      - "scripts/shared_compiler_runtime_acceptance_harness.py"
      - "scripts/m313_historical_checker_compatibility_bridge.py"
      - "scripts/check_m313_*.py"
      - "scripts/run_m313_*_readiness.py"
      - "tests/tooling/test_check_m313_*.py"
      - "spec/planning/compiler/m313/**"
      - "docs/contracts/m313_*"
      - "package.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/m313-validation-acceptance-first.yml"
      - "scripts/m313_acceptance_first_ci_runner.py"
      - "scripts/shared_compiler_runtime_acceptance_harness.py"
      - "scripts/m313_historical_checker_compatibility_bridge.py"
      - "scripts/check_m313_*.py"
      - "scripts/run_m313_*_readiness.py"
      - "tests/tooling/test_check_m313_*.py"
      - "spec/planning/compiler/m313/**"
      - "docs/contracts/m313_*"
      - "package.json"

permissions:
  contents: read

concurrency:
  group: m313-validation-acceptance-first-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-policy-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run retained static guards
        run: python scripts/m313_acceptance_first_ci_runner.py --stage static-guards

  acceptance-suites:
    runs-on: ubuntu-latest
    needs:
      - static-policy-guards
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run acceptance suites
        run: python scripts/m313_acceptance_first_ci_runner.py --stage acceptance-suites

  compatibility-bridges:
    runs-on: ubuntu-latest
    needs:
      - acceptance-suites
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run compatibility bridges
        run: python scripts/m313_acceptance_first_ci_runner.py --stage compatibility-bridges

  validation-topology:
    runs-on: ubuntu-latest
    needs:
      - static-policy-guards
      - acceptance-suites
      - compatibility-bridges
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run integrated topology summary
        run: python scripts/m313_acceptance_first_ci_runner.py --stage topology
