name: ObjC3C Core CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: objc3c-core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-smoke:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Build native objc3c artifacts
        run: npm run build:objc3c-native

      - name: Probe hosted-runner LLVM capabilities
        run: npm run check:objc3c:llvm-capabilities

      - name: Verify capability-routed source parity
        run: npm run check:objc3c:library-cli-parity:source:m144

      - name: Run native execution smoke when llc is available
        shell: pwsh
        run: |
          $summaryPath = "tmp/artifacts/objc3c-native/m144/llvm_capabilities/summary.json"
          $summary = Get-Content $summaryPath | ConvertFrom-Json
          if (-not $summary.llc.found -or -not $summary.llc_features.supports_filetype_obj) {
            Write-Host "Skipping execution smoke: hosted runner does not provide llc --filetype=obj capability."
            exit 0
          }
          npm run test:objc3c:execution-smoke
