name: ObjC3C Core CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: objc3c-core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-smoke:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Install LLVM toolchain
        shell: pwsh
        run: |
          choco install llvm --version=21.1.8 -y --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "C:\Program Files\LLVM\bin\llc.exe" --version

      - name: Build native objc3c artifacts
        run: npm run build:objc3c-native

      - name: Run native execution smoke
        run: npm run test:objc3c:execution-smoke
