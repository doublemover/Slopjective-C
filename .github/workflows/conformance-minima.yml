name: conformance-minima

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "tests/conformance/**"
      - "scripts/check_conformance_suite.ps1"
      - ".github/workflows/conformance-minima.yml"
  push:
    branches:
      - main
    paths:
      - "tests/conformance/**"
      - "scripts/check_conformance_suite.ps1"
      - ".github/workflows/conformance-minima.yml"

permissions:
  contents: read

concurrency:
  group: conformance-minima-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance-minima:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Build native objc3c artifacts
        run: npm run build:objc3c-native

      - name: Verify conformance suite minima and required families
        shell: pwsh
        run: ./scripts/check_conformance_suite.ps1
