name: Roadmap Execution Task
description: Create a lean roadmap issue aligned to the simplified cleanup-era authoring contract.
title: "[ROADMAP] <title core>"
labels:
  - priority:P1
  - type:roadmap
body:
  - type: markdown
    attributes:
      value: |
        Use this template for roadmap/process/governance tasks.
        Keep the issue body lean, concrete, and executable.
  - type: input
    id: outcome_summary
    attributes:
      label: Outcome Summary
      description: One sentence describing the required outcome.
      placeholder: Freeze a compact ownership/dependency model for 4 parallel lanes.
    validations:
      required: true
  - type: textarea
    id: why_it_matters
    attributes:
      label: Why It Matters
      description: Explain the repo problem this issue resolves and how it supports the milestone exit gate.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Concrete completion conditions.
      placeholder: |
        - Ownership boundaries are explicit.
        - Handoff rules are machine-auditable.
        - No parallel scaffolds are introduced.
    validations:
      required: true
  - type: textarea
    id: implementation_surfaces
    attributes:
      label: Primary Implementation Surfaces
      description: Files, generators, templates, or workflows most likely to change.
      placeholder: |
        - .github/ISSUE_TEMPLATE/roadmap_execution.yml
        - tmp/planning/<generator>.py
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Prerequisite issues or milestones, or state `None`.
      placeholder: |
        - #7830
        - M317-C001
    validations:
      required: true
  - type: dropdown
    id: validation_posture
    attributes:
      label: Validation Posture
      description: Pick the default validation class for this issue.
      options:
        - shared_acceptance_harness
        - static_policy_guard
        - migration_bridge
        - generator_contract_only
    validations:
      required: true
  - type: dropdown
    id: budget_impact
    attributes:
      label: Budget Impact
      description: Declare whether this issue grows any governed budget family.
      options:
        - no_budget_growth
        - within_existing_budget
        - requires_exception_record
    validations:
      required: true
  - type: input
    id: exception_record
    attributes:
      label: Exception Record
      description: Required when budget impact is `requires_exception_record`; otherwise leave blank.
      placeholder: EXC-ANTI-NOISE-001
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Planning hygiene: prefer shared validation and runner surfaces, keep notes bounded,
        and cite an exception record whenever the issue exceeds an anti-noise budget.
  - type: textarea
    id: notes
    attributes:
      label: Optional Notes
      description: Include only bounded ambiguity-reducing context.
      placeholder: |
        - Optional. Omit if unnecessary.
    validations:
      required: false
