name: Conformance Execution Task
description: Create a lean conformance/validation issue aligned to the simplified cleanup-era authoring contract.
title: "[CONFORMANCE] <title core>"
labels:
  - priority:P1
  - area:conformance
  - type:roadmap
body:
  - type: markdown
    attributes:
      value: |
        Use this template for conformance, validation, and reporting work.
        Prefer shared validation surfaces over new per-issue scaffolds.
  - type: input
    id: outcome_summary
    attributes:
      label: Outcome Summary
      description: One sentence describing the expected conformance or validation outcome.
      placeholder: Freeze a machine-readable stability-score contract for public reporting.
    validations:
      required: true
  - type: textarea
    id: why_it_matters
    attributes:
      label: Why It Matters
      description: Explain the trust, reporting, or validation gap this issue closes.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Concrete completion conditions.
      placeholder: |
        - Evidence is deterministic.
        - Coverage/reporting scope is explicit.
        - Public claims stay inside the proof boundary.
    validations:
      required: true
  - type: textarea
    id: implementation_surfaces
    attributes:
      label: Primary Implementation Surfaces
      description: Files, corpora, reports, or workflows most likely to change.
      placeholder: |
        - tests/tooling/<suite>
        - docs/<reporting-surface>.md
        - scripts/<report-generator>.py
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Prerequisite issues or milestones, or state `None`.
      placeholder: |
        - #7684
        - M301-E001
    validations:
      required: true
  - type: dropdown
    id: validation_posture
    attributes:
      label: Validation Posture
      description: Pick the default validation class for this issue.
      options:
        - shared_acceptance_harness
        - static_policy_guard
        - migration_bridge
        - generator_contract_only
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Optional Notes
      description: Include only bounded ambiguity-reducing context.
      placeholder: |
        - Optional. Omit if unnecessary.
    validations:
      required: false
